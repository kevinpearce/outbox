services:

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "${SQL_PORT}:${SQL_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U ${DB_USER} -P '${DB_PASSWORD}' -Q 'SELECT 1' -C || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Outbox.Api.Minimal/Dockerfile
    container_name: outbox-api
    depends_on:
      sql:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:${API_PORT}"
      ConnectionStrings__DefaultConnection: "Server=${DB_SERVER},${SQL_PORT};Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True"
    ports:
      - "${API_PORT}:${API_PORT}"

  ui:
    build:
      context: .
      dockerfile: Outbox.Ui/Dockerfile
    container_name: outbox-ui
    depends_on:
      api:
        condition: service_started
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:${UI_PORT}"
      ApiBaseUrl: "http://api:${API_PORT}"
    ports:
      - "${UI_PORT}:${UI_PORT}"

  service:
    build:
      context: .
      dockerfile: Outbox.Service/Dockerfile
    container_name: outbox-service
    depends_on:
      sql:
        condition: service_healthy
      ui:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Server=${DB_SERVER},${SQL_PORT};Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True"
      Ui__BaseUrl: "http://ui:${UI_PORT}"
      Worker__PollingIntervalSeconds: "${WORKER_POLLING_INTERVAL_SECONDS}"
